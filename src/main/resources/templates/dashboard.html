<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calorie Tracker</title>
    <style>
        body { background-color: #007bff; color: white; font-family: sans-serif; text-align: center; margin: 0; }
        .header { background: #0056b3; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 20px; }
        input { margin: 5px; padding: 10px; border-radius: 5px; border: none; width: 80%; max-width: 250px; }
        button { padding: 12px; cursor: pointer; background: white; color: #007bff; border: none; font-weight: bold; border-radius: 5px; width: 85%; max-width: 300px; margin: 5px; }
        .stats { margin-top: 20px; border-top: 1px solid white; padding-top: 15px; display: inline-block; text-align: left; }
    </style>
</head>
<body>
    <div class="header">
        <span>💪 CALORIE TRACKER</span>
        <span style="font-size: 25px;">☰</span>
    </div>
    <div class="container">
        <form action="/agregar" method="post">
            <input type="text" name="nombre" placeholder="Nombre de comida" required><br>
            <input type="number" step="0.1" name="cal" placeholder="Calorías" required>
            <input type="number" step="0.1" name="prot" placeholder="Proteínas" required><br>
            <input type="number" step="0.1" name="carb" placeholder="Carbos" required>
            <input type="number" step="0.1" name="gras" placeholder="Grasas" required><br>
            <button type="submit">AGREGAR COMIDA</button>
        </form>
        <form action="/cambiarDia" method="post">
            <button type="submit" style="background: #f8f9fa; color: #333; font-size: 12px;">Reiniciar Día</button>
        </form>
        <div class="stats">
            <p>Calorías: <span th:text="${totalCalorias}">0.0</span></p>
            <p>Proteínas: <span th:text="${totalProteinas}">0.0</span></p>
            <p>Carbos: <span th:text="${totalCarbohidratos}">0.0</span></p>
            <p>Grasas: <span th:text="${totalGrasas}">0.0</span></p>
        </div>
    </div>
</body>
</html>
